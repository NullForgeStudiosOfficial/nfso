
<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NullForgeStudiosOfficial</title>

    <link rel="stylesheet" href="Style.css">

</head>

<body>

    <div id="BackgroundContainer">
        <img id="Background" src="Assets/Background.png">
    </div>

    

    <!-- Main Menu -->
    <div id="MainPage">

        <div id="TopBar">
            <img id="NFSOLogo" src="Assets/NFSMainLogoNoBack.png">
            <img id="VoidEyes" src = "Assets/VoidEyesFull.png">

            <div class="Text" id="NFSOTitle">
                NullForgeStudiosOfficial
            </div>

        </div>

        <div id = "ScrollSpace">
            <button class = "ArdronButton" id = "Button1">
                <div class ="InfoBox">
                    <div class ="ButtonTitle">
                        Ardron Universe
                    </div>

                    <div class = "ButtonInfo">Eight games. One universe. One purchase.

                        Explore a world shaped by the choices of ancient gods, where every game tells a different story and unlocks new perspectives on the same interconnected universe.

                        Story-heavy. System-heavy. Built to reward curiosity.
                    </div>
                    
                </div>
            </button>

            <button class = "ArdronButton" id = "Button2">
                <div class ="InfoBox">
                    <div class ="ButtonTitle">
                        Ardron Quiz
                    </div>

                    <div class = "ButtonInfo">Before anyone can enter Ardron, they must first be understood.

                        Stand before the Arbiter, the silent Watcher of the Void, and answer 33 carefully chosen questions.
                        
                        There are no right or wrong answers, only the ideals, motivations, and choices that define you.

                        Once your judgment is complete, you'll be assigned to the Realm that best reflects who you are:
                        Eimon, Elusia, Grimlowe, Sostrum, Vidulyn, or Yumalon.

                        Every soul resonates with one Realm. The question is... which one resonates with yours?
                    </div>
                </div>
            </button>

            <button class = "ArdronButton" id = "Button3">
                <div class ="InfoBox">
                    <div class ="ButtonTitle">
                        Our Discord — [WIP]
                    </div>

                    <div class = "ButtonInfo">Daemon Protocol is the official NullForge Studios hub. 
                        
                        It's where the game is played, where development is shared, and where the community comes together. 
                        
                        Join us to experience the game, follow its evolution, and help shape what comes next.
                    </div>
                </div>
            </button>

            <button class = "ArdronButton" id = "Button4">
                <div class ="InfoBox">
                    <div class ="ButtonTitle">
                        Daemon Protocol — [WIP]
                    </div>

                    <div class = "ButtonInfo">The official companion portal for Daemon Protocol.
            
                        Create and customize your Daemon, allocate stats, select DLLs, manage equipment, and interact with Axiom as your journey through Icolass unfolds.
                    </div>
                </div>
            </button>

            <button class = "ArdronButton" id = "Button5">
                <div class ="InfoBox">
                    <div class ="ButtonTitle">
                        Our Live Streams
                    </div>

                    <div class = "ButtonInfo">No schedules.
                        No esports.
                        No pretending to be professionals.
                        Just games, game development, and a good excuse to spend time with the community.
                    </div>
                </div>
            </button>

            <button class = "ArdronButton" id = "Button6">
                <div class ="InfoBox">
                    <div class ="ButtonTitle">
                        Ko-Fi
                    </div>

                    <div class = "ButtonInfo">If you've enjoyed our content or would like to support   future development, consider becoming a Ko-fi supporter.
                        Every contribution helps fund new projects, server costs, and continued updates across the Ardron universe.
                    </div>
                </div>
            </button>

            <button class = "ArdronButton" id = "Button7">
                <div class ="InfoBox">
                    <div class ="ButtonTitle">
                        Work Logs
                    </div>

                    <div class = "ButtonInfo">Curious how these projects are built? Every night's progress is documented here.
                        
                        From major milestones and technical breakthroughs to random ideas that somehow survive long enough to become real features.
                    </div>
                </div>
            </button>

            <button class = "ArdronButton" id = "Button8">
                <div class ="InfoBox">
                    <div class ="ButtonTitle">
                        Discord Archive — [WIP]
                    </div>

                    <div class = "ButtonInfo">Every suggestion, bug report, discussion, and question is preserved here from Discord.
                        
                    Browse the history of Ardron Universes development and see how the community has helped shape the game over time.
                    </div>
                </div>
            </button>

            <div id="BottomSpacer"></div>
                
        </div>

        
       
    </div>

    <div id="ScanLines"></div>
    <img id="Sanctum" src="Assets/Sanctumborder.png">

    <script src="Code.js"></script>

</body>

</html>
